<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>JOE | Fast meals. Zero chaos.</title>
  <link rel="icon" type="image/png" href="/JeoLogoFinal.png">
  <!-- Critical resource preload: logo fetches BEFORE JS bundle parses -->
  <link rel="preload" as="image" href="/JeoLogoFinal.png" fetchpriority="high">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    
    // 🔥 [GLOBAL-SUBSCRIBE] Clean entry point called by the 'Big Deals' button
    window.joeSubscribe = function() {
      window.OneSignalDeferred.push(async function(OneSignal) {
        try {
          const permission = await OneSignal.Notifications.requestPermission();
          console.log('[JOE] Notification permission:', permission);
        } catch(e) {
          console.warn('[JOE] Permission request failed:', e);
        }
      });
    };

    OneSignalDeferred.push(async function(OneSignal) {
      if (!window.location.hostname.includes('joecafebrand.netlify.app')) {
        console.warn('🛡️ OneSignal skipped: Localhost/Dev site.');
        return;
      }
      await OneSignal.init({
        appId: "c7140793-2586-4d5c-9f38-b6fb98815c3b",
        safari_web_id: "web.onesignal.auto.61cc1b76-79db-483e-a0b9-263210abb193",
        serviceWorkerPath: 'OneSignalSDKWorker.js',
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true
      });
      console.log('[JOE] OneSignal ready. Click Big Deals to subscribe.');
    });
  </script>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
