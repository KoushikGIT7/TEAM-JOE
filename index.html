<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>JOE | Fast meals. Zero chaos.</title>
  <link rel="icon" type="image/png" href="/JeoLogoFinal.png">
  <!-- Critical resource preload: logo fetches BEFORE JS bundle parses -->
  <link rel="preload" as="image" href="/JeoLogoFinal.png" fetchpriority="high">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 📣 [ONESIGNAL-INDUSTRIAL-PUSH] -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "10fbd2bc-87d8-46b9-80c8-c26384195535",
        safari_web_id: "web.onesignal.auto.017f9378-7499-4b97-8d47-e55f2bb151c0",
        notifyButton: {
          enable: false,
        },
        allowLocalhostAsSecureOrigin: true
      });

      // 🔥 [GESTURE-HANDSHAKE] Ensure the prompt fires on the very first student interaction
      const promptOnGesture = () => {
        OneSignal.Notifications.requestPermission();
        window.removeEventListener('click', promptOnGesture);
        window.removeEventListener('touchstart', promptOnGesture);
      };
      window.addEventListener('click', promptOnGesture);
      window.addEventListener('touchstart', promptOnGesture);
    });
  </script>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
