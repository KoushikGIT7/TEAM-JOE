<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>JOE | Fast meals. Zero chaos.</title>
  <link rel="icon" type="image/png" href="/JeoLogoFinal.png">
  <!-- Critical resource preload: logo fetches BEFORE JS bundle parses -->
  <link rel="preload" as="image" href="/JeoLogoFinal.png" fetchpriority="high">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    
    // 🔥 [GLOBAL-SUBSCRIBE] Clean entry point called by the 'Big Deals' button
    window.joeSubscribe = function() {
      console.log('🔔 [CLICK-DETECTION] Notification Bell tapped.');
      
      if (!window.OneSignalDeferred) {
         console.warn('⚠️ [ONESIGNAL-MISSING] SDK script failed to load from CDN. Handshake impossible.');
         return;
      }

      if (!window.isSecureContext && window.location.hostname !== 'localhost') {
        console.error('🛑 Critical: OneSignal REQUIRES HTTPS (Secure Context) or Localhost to function at the browser level.');
        alert("Notification Engine blocked. You are running on an insecure connection (HTTP). OneSignal requires HTTPS.");
        return;
      }

      window.OneSignalDeferred.push(async function(OneSignal) {
        console.log('[JOE] Triggering Notification Handshake...');
        try {
          // 🛡️ [DOUBLE-STRIKE] Request permission AND opt-in
          const permission = await OneSignal.Notifications.requestPermission();
          console.log('[JOE] Notification Status:', permission);
          
          if (permission === 'granted') {
            // Force opt-in if the student had manually disabled it before
            if (OneSignal.User?.PushSubscription) {
              await OneSignal.User.PushSubscription.optIn();
              console.log('[JOE] Push registration forced active.');
            }
            window.dispatchEvent(new CustomEvent('joe_notif_granted'));
          } else {
             console.warn('[JOE] Handshake denied by student browser.');
          }
        } catch(e) {
          console.error('[JOE] Critical Handshake failure:', e);
        }
      });
    };

    // 🏁 [GLOBAL-IDENTITY-STATE] Cache UID if SDK isn't ready yet
    window.pendingJoeSyncUserId = null;

    window.joeSyncUser = function(userId) {
      if (!userId) return;
      
      const os = window.OneSignal;
      if (!os || !os.initialized) {
        console.log('[JOE] OneSignal hydration pending. Caching UID:', userId);
        window.pendingJoeSyncUserId = userId;
        return;
      }

      window.OneSignalDeferred.push(async function() {
        try {
          // Extra safety buffer for internal Manager hydration
          await new Promise(r => setTimeout(r, 800));
          await os.login(userId);
          await os.User.addTag('role', 'STUDENT');
          console.log('[JOE] Identitystrike success:', userId);
          window.pendingJoeSyncUserId = null;
        } catch (e) {
          console.error('[JOE] identity Sync Crush:', e);
        }
      });
    };

    OneSignalDeferred.push(async function(OneSignal) {
      // 🛡️ [DOMAIN-SHIELD] Prevent fatal SDK crashes on unauthorized staging/local domains
      const isTestDomain = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const isProdDomain = window.location.hostname.includes('joecafebrand.netlify.app');
      
      if (!isTestDomain && !isProdDomain) {
         console.warn('🚧 [ONESIGNAL-SHIELD] Current domain is not authorized in OneSignal Dashboard. SDK initialization silenced to prevent crash.');
         return;
      }

      try {
        await OneSignal.init({
          appId: "c7140793-2586-4d5c-9f38-b6fb98815c3b",
          safari_web_id: "web.onesignal.auto.61cc1b76-79db-483e-a0b9-263210abb193",
          serviceWorkerPath: '/onesignalsdk.sw.js', 
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true
        });
        console.log('✅ [ONESIGNAL] Industrial Engine Ready.');
        
        if (window.pendingJoeSyncUserId) {
          console.log('[JOE] Found pending student identity. Resolving now...');
          window.joeSyncUser(window.pendingJoeSyncUserId);
        }
      } catch (err) {
        // Specifically catch the domain error to prevent global uncaught exceptions
        if (err.message && err.message.includes('netlify.app')) {
           console.warn('🛡️ [ONESIGNAL] Initialized failed (Domain Restricted). If you are testing locally, ensure "Localhost" is allowed in OneSignal Web Configuration.');
        } else {
           console.warn('⚠️ [ONESIGNAL-INITIALIZATION-FAIL]:', err);
        }
      }
    });
  </script>
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
